services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: resume-screener-db
    environment:
      POSTGRES_DB: resume_screener
      POSTGRES_USER: hazeljs
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hazeljs -d resume_screener"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: resume-screener-redis
    ports:
      - "6380:6379"  # Use port 6380 instead of 6379
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
