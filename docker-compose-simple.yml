services:
  # PostgreSQL Database only
  postgres:
    image: postgres:15
    container_name: resume-screener-db
    environment:
      POSTGRES_DB: resume_screener
      POSTGRES_USER: hazeljs
      POSTGRES_PASSWORD: password123
    ports:
      - "5434:5432"  # Use port 5434 instead of 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hazeljs -d resume_screener"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
